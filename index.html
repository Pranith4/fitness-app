<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0">
<meta name="theme-color" content="#070709">
<title>FitBounty</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070709;
  --ink2:#0d0d12;
  --ink3:#14141c;
  --ink4:#1c1c27;
  --ink5:#252535;
  --rim:rgba(255,255,255,.06);
  --rim2:rgba(255,255,255,.11);
  --rim3:rgba(255,255,255,.18);
  --gold:#c9975c;
  --gold2:#a8784a;
  --gold3:#e8b87a;
  --goldfaint:rgba(201,151,92,.09);
  --goldfaint2:rgba(201,151,92,.18);
  --jade:#3ecf8e;
  --jadefaint:rgba(62,207,142,.08);
  --rose:#e05858;
  --rosefaint:rgba(224,88,88,.08);
  --sky:#5b8dee;
  --pearl:#ede9e3;
  --pearl2:rgba(237,233,227,.6);
  --pearl3:rgba(237,233,227,.28);
  --pearl4:rgba(237,233,227,.12);
  --fd:'Cormorant Garamond',serif;
  --fb:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --r:12px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
  --nav-h:70px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--fb);background:var(--ink);color:var(--pearl);font-size:15px;line-height:1.5}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--ink5)}
::-webkit-scrollbar-track{background:transparent}

/* ═══ SCREEN SYSTEM ═══ */
.scr{
  position:fixed;inset:0;display:none;flex-direction:column;
  background:var(--ink);overflow:hidden;
}
.scr.on{display:flex}
.scr.slide-in{animation:slideIn .32s cubic-bezier(.22,1,.36,1) both}
.scr.slide-out{animation:slideOut .28s cubic-bezier(.55,0,1,.45) both}
@keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}

/* ═══ LOGIN ═══ */
#s-auth{
  align-items:center;justify-content:center;
  background:var(--ink);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,151,92,.07) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%,rgba(62,207,142,.04) 0%,transparent 70%);
  padding:20px;
}
.auth-wrap{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:36px;animation:fadeUp .5s .1s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.auth-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:72px;
  background:var(--goldfaint2);
  border:1px solid rgba(201,151,92,.3);
  border-radius:20px;margin-bottom:16px;
  box-shadow:0 0 40px rgba(201,151,92,.12);
}
.auth-mark span{font-size:32px}
.auth-brand{font-family:var(--fd);font-size:2.6rem;font-weight:700;color:var(--gold);letter-spacing:1px;line-height:1}
.auth-sub{font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:var(--pearl3);margin-top:8px}

.auth-card{
  background:var(--ink2);
  border:1px solid var(--rim2);
  border-radius:20px;
  padding:28px 24px;
  box-shadow:0 40px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.03);
  animation:fadeUp .5s .2s both;
}
.auth-tabs{
  display:flex;background:rgba(255,255,255,.04);
  border:1px solid var(--rim);border-radius:10px;padding:3px;margin-bottom:24px;
}
.auth-tab{
  flex:1;padding:10px;border-radius:8px;border:none;
  background:transparent;color:var(--pearl3);
  font-family:var(--fb);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.3px;
}
.auth-tab.on{background:var(--gold);color:var(--ink);box-shadow:0 2px 12px rgba(201,151,92,.3)}

.fg{margin-bottom:14px;position:relative}
.fl{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:1.5px;color:var(--pearl3);margin-bottom:7px;
  text-transform:uppercase;
}
.fi{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.04);
  color:var(--pearl);
  border:1.5px solid var(--rim);
  border-radius:var(--r);
  font-family:var(--fb);font-size:14px;
  transition:all .18s;-webkit-appearance:none;
}
.fi:focus{outline:none;border-color:rgba(201,151,92,.5);background:rgba(201,151,92,.04)}
.fi::placeholder{color:var(--pearl4)}
.errmsg{
  background:rgba(224,88,88,.07);border:1px solid rgba(224,88,88,.2);
  border-radius:var(--r);padding:10px 14px;font-size:13px;
  color:var(--rose);margin-bottom:14px;display:none;
}
.btn-primary{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--gold3) 0%,var(--gold) 60%,var(--gold2) 100%);
  color:var(--ink);border:none;border-radius:var(--r);
  font-family:var(--fb);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.3px;
  box-shadow:0 4px 20px rgba(201,151,92,.25);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(201,151,92,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0);box-shadow:0 2px 12px rgba(201,151,92,.2)}
.btn-primary:disabled{background:var(--ink5);color:var(--pearl3);box-shadow:none;transform:none}
.spin{width:16px;height:16px;border:2px solid rgba(7,7,9,.2);border-top-color:var(--ink);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ═══ MAIN APP ═══ */
#s-app{background:var(--ink)}
.app-inner{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;
}

/* ═══ TOP BAR ═══ */
.topbar{
  padding:calc(var(--st) + 16px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,7,9,.94);backdrop-filter:blur(24px) saturate(1.6);
  border-bottom:1px solid var(--rim);flex-shrink:0;
  position:relative;z-index:10;
}
.topbar-title{
  font-family:var(--fd);font-size:1.5rem;font-weight:700;
  color:var(--gold);letter-spacing:.5px;
}
.topbar-sub{font-size:11px;color:var(--pearl3);margin-top:1px;letter-spacing:.5px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--rim);background:var(--ink3);
  color:var(--pearl2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.icon-btn:active{transform:scale(.88);background:var(--ink4)}
.avatar{
  width:36px;height:36px;border-radius:10px;
  border:1.5px solid rgba(201,151,92,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--ink);
  background:var(--gold);cursor:pointer;
  font-family:var(--fb);
}

/* ═══ PAGES ═══ */
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--sb) + 12px)}
.page.on{display:block;animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both}

/* ═══ BOTTOM NAV ═══ */
.bot-nav{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  height:calc(var(--nav-h) + var(--sb));
  padding-bottom:var(--sb);
  display:flex;align-items:flex-start;
  background:rgba(10,10,15,.97);backdrop-filter:blur(24px);
  border-top:1px solid var(--rim);
  z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;padding:10px 4px 6px;
  cursor:pointer;transition:all .18s;border:none;background:none;
  -webkit-tap-highlight-color:transparent;
}
.nav-icon{font-size:20px;transition:transform .2s;line-height:1}
.nav-label{font-size:9.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--pearl3);transition:color .2s}
.nav-item.on .nav-label{color:var(--gold)}
.nav-item.on .nav-icon{transform:scale(1.1)}

/* ═══ HOME PAGE ═══ */
.home-hero{
  margin:20px 16px 0;
  background:linear-gradient(135deg,var(--ink3) 0%,var(--ink2) 100%);
  border:1px solid var(--rim2);border-radius:20px;
  padding:24px 20px;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(201,151,92,.12) 0%,transparent 70%);
  pointer-events:none;
}
.home-hero-greeting{font-size:12px;color:var(--pearl3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.home-hero-name{font-family:var(--fd);font-size:2rem;font-weight:700;color:var(--pearl);line-height:1.1;margin-bottom:16px}
.home-hero-name span{color:var(--gold)}
.hero-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px}
.hero-stat{text-align:center}
.hero-stat-val{font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--gold);line-height:1}
.hero-stat-lbl{font-size:10px;color:var(--pearl3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.hero-divider{width:1px;background:var(--rim2);align-self:stretch;margin:0 4px}

.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 16px 0}
.action-card{
  background:var(--ink3);border:1px solid var(--rim);
  border-radius:16px;padding:16px;cursor:pointer;
  transition:all .2s;display:flex;flex-direction:column;gap:8px;
}
.action-card:active{transform:scale(.96)}
.action-card.primary{
  background:linear-gradient(135deg,rgba(201,151,92,.15),rgba(201,151,92,.05));
  border-color:rgba(201,151,92,.25);
}
.action-icon{font-size:24px;line-height:1}
.action-title{font-weight:600;font-size:13px;color:var(--pearl)}
.action-sub{font-size:11px;color:var(--pearl3)}

.section-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 16px 10px;
}
.section-title{font-family:var(--fd);font-size:1.25rem;font-weight:600;color:var(--pearl)}
.section-link{font-size:12px;color:var(--gold);font-weight:500;cursor:pointer}

/* Mini leaderboard */
.mini-lb{padding:0 16px}
.mini-lb-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--rim);
}
.mini-lb-row:last-child{border-bottom:none}
.mini-rank{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--pearl3);width:24px;text-align:center;flex-shrink:0}
.mini-rank.top{color:var(--gold)}
.mini-av{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--ink);
}
.mini-name{flex:1;font-weight:500;font-size:14px;color:var(--pearl)}
.mini-badge{font-size:10px;color:var(--pearl3);margin-top:2px}
.mini-pct{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--jade)}
.mini-pct.zero{color:var(--pearl3)}

/* Today log nudge */
.log-nudge{
  margin:0 16px;
  background:var(--goldfaint);border:1px solid rgba(201,151,92,.2);
  border-radius:16px;padding:16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:all .18s;
}
.log-nudge:active{transform:scale(.98)}
.log-nudge-icon{font-size:28px;flex-shrink:0}
.log-nudge-text{flex:1}
.log-nudge-title{font-weight:600;font-size:14px;color:var(--gold)}
.log-nudge-sub{font-size:12px;color:var(--pearl2);margin-top:2px}
.log-nudge-arrow{color:var(--gold);font-size:18px}

/* ═══ LOG PAGE ═══ */
.log-page{padding:20px 16px;max-width:480px;margin:0 auto}
.log-hero{
  background:var(--ink3);border:1px solid var(--rim2);
  border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:20px;
}
.log-hero-icon{font-size:40px;margin-bottom:12px}
.log-hero-title{font-family:var(--fd);font-size:1.6rem;font-weight:700;color:var(--pearl);margin-bottom:4px}
.log-hero-sub{font-size:13px;color:var(--pearl3)}
.log-day-badge{
  display:inline-block;padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  margin-top:10px;
}
.log-day-badge.official{background:rgba(62,207,142,.12);color:var(--jade);border:1px solid rgba(62,207,142,.2)}
.log-day-badge.practice{background:var(--goldfaint);color:var(--gold);border:1px solid rgba(201,151,92,.2)}

.weight-input-wrap{margin-bottom:20px}
.weight-input-card{
  background:var(--ink2);border:1px solid var(--rim2);
  border-radius:20px;padding:24px 20px;text-align:center;
  margin-bottom:12px;position:relative;overflow:hidden;
}
.weight-display{
  display:flex;align-items:baseline;justify-content:center;gap:8px;
  margin-bottom:8px;
}
.weight-num{
  font-family:var(--fm);font-size:4rem;font-weight:700;
  color:var(--pearl);line-height:1;outline:none;
  border:none;background:transparent;text-align:center;
  width:180px;caret-color:var(--gold);
}
.weight-num:focus{color:var(--gold)}
.weight-unit{font-family:var(--fm);font-size:1.4rem;color:var(--pearl3);font-weight:400}
.weight-tap-hint{font-size:12px;color:var(--pearl3);margin-top:4px}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.numpad-btn{
  padding:18px 8px;border-radius:14px;border:1px solid var(--rim);
  background:var(--ink3);color:var(--pearl);
  font-family:var(--fm);font-size:1.1rem;font-weight:600;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.numpad-btn:active{background:var(--ink5);transform:scale(.94)}
.numpad-btn.dot{color:var(--pearl2)}
.numpad-btn.del{background:rgba(224,88,88,.06);color:var(--rose)}
.numpad-btn.del:active{background:rgba(224,88,88,.15)}

.photo-btn{
  width:100%;padding:15px;border-radius:14px;
  border:1.5px dashed rgba(201,151,92,.3);
  background:var(--goldfaint);color:var(--gold);
  font-family:var(--fb);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;
}
.photo-btn:active{background:var(--goldfaint2);transform:scale(.98)}

.log-history{margin-top:24px}
.log-history-title{font-family:var(--fd);font-size:1.1rem;font-weight:600;color:var(--pearl2);margin-bottom:14px;padding:0 2px}
.log-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--rim);
}
.log-row:last-child{border:none}
.log-date{flex:1;font-size:13px;color:var(--pearl3)}
.log-wt{font-family:var(--fm);font-size:16px;font-weight:700;color:var(--pearl)}
.log-delta{font-family:var(--fm);font-size:12px;font-weight:600;padding:3px 8px;border-radius:8px}
.log-delta.loss{background:rgba(62,207,142,.1);color:var(--jade)}
.log-delta.gain{background:rgba(224,88,88,.1);color:var(--rose)}
.log-delta.neutral{color:var(--pearl3)}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-dot.monday{background:var(--jade)}
.log-dot.other{background:var(--pearl4)}

/* ═══ PROGRESS PAGE ═══ */
.progress-page{padding:16px;max-width:480px;margin:0 auto}
.prog-summary{
  background:var(--ink3);border:1px solid var(--rim2);
  border-radius:20px;padding:24px 20px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.prog-summary::after{
  content:'';position:absolute;bottom:-30px;right:-30px;
  width:140px;height:140px;
  background:radial-gradient(circle,rgba(62,207,142,.07) 0%,transparent 70%);
}
.prog-big-pct{font-family:var(--fm);font-size:3.5rem;font-weight:700;line-height:1;margin-bottom:4px}
.prog-big-lbl{font-size:11px;color:var(--pearl3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px}
.prog-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.prog-mini-item{background:var(--ink4);border-radius:12px;padding:12px 10px;text-align:center}
.prog-mini-val{font-family:var(--fm);font-size:1rem;font-weight:700;color:var(--pearl)}
.prog-mini-lbl{font-size:9.5px;color:var(--pearl3);letter-spacing:.8px;text-transform:uppercase;margin-top:4px}

.chart-card{
  background:var(--ink2);border:1px solid var(--rim);
  border-radius:20px;padding:20px;margin-bottom:14px;
}
.chart-title{font-size:12px;font-weight:600;color:var(--pearl3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
canvas.line-chart{width:100%;height:160px;display:block}

/* Week table */
.week-table{margin-bottom:14px;background:var(--ink2);border:1px solid var(--rim);border-radius:20px;overflow:hidden}
.wt-header{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--rim);background:var(--ink3)}
.wt-header span{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--pearl3)}
.wt-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr;gap:8px;padding:13px 16px;border-bottom:1px solid var(--rim);transition:background .15s;align-items:center}
.wt-row:last-child{border:none}
.wt-row.latest{background:var(--goldfaint)}
.wt-date{font-size:13px;color:var(--pearl2);display:flex;align-items:center;gap:6px}
.wt-date .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wt-wt{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--pearl)}
.wt-chg{font-family:var(--fm);font-size:12px;font-weight:700}
.wt-chg.loss{color:var(--jade)}
.wt-chg.gain{color:var(--rose)}
.wt-chg.flat{color:var(--pearl3)}

/* ═══ LEADERBOARD PAGE ═══ */
.lb-page{padding:16px;max-width:480px;margin:0 auto}
.lb-podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px;padding:0 8px}
.pod{display:flex;flex-direction:column;align-items:center;flex:1;max-width:140px}
.pod-name{font-size:11px;font-weight:600;color:var(--pearl2);margin-bottom:6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.pod-av{border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--ink);font-family:var(--fb)}
.pod.p1 .pod-av{width:64px;height:64px;font-size:18px;border:2px solid var(--gold3);box-shadow:0 0 24px rgba(201,151,92,.3)}
.pod.p2 .pod-av,.pod.p3 .pod-av{width:52px;height:52px;font-size:14px}
.pod-crown{font-size:20px;margin-bottom:4px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.pod-block{width:100%;border-radius:12px 12px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px}
.pod.p1 .pod-block{height:80px;background:linear-gradient(180deg,rgba(201,151,92,.2),rgba(201,151,92,.06));border:1px solid rgba(201,151,92,.25)}
.pod.p2 .pod-block,.pod.p3 .pod-block{height:60px;background:var(--ink3);border:1px solid var(--rim)}
.pod-pct{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--jade)}
.pod-rank-lbl{font-size:10px;color:var(--pearl3)}

.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-item{
  display:flex;align-items:center;gap:12px;
  background:var(--ink3);border:1px solid var(--rim);
  border-radius:14px;padding:13px 14px;
  transition:all .2s;cursor:pointer;
}
.lb-item:active{transform:scale(.98)}

<script>
// ════════════════════════════════════════════════════════════════
// FITBOUNTY — PREMIUM APP
// ════════════════════════════════════════════════════════════════

const GAS = 'https://script.google.com/macros/s/AKfycbzwWrCRjHYeJA0-5SHxAamG-H96m5ItJzOXtNhgu0sy43xIlkCPLTeayK6bKT1-S9-Raw/exec';
const AV_COLORS = ['#c9975c','#3ecf8e','#5b8dee','#e05858','#a855f7','#06b6d4','#f59e0b','#10b981'];

// ── Session ──────────────────────────────────────────────────────
const S = {
  get user(){ return localStorage.getItem('fb_user') || null },
  set(u){ localStorage.setItem('fb_user', u) },
  clear(){ localStorage.removeItem('fb_user') }
};

// ── Cache ────────────────────────────────────────────────────────
let _lb        = null;
let _myW       = null;
let _otherW    = {};
let _pendingWt = null;
let _chatTyping = null;
let _chatHistory = [];
let _currentPage = 'home';
let _weightInput = '';

// ── Utils ────────────────────────────────────────────────────────
const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
const fmtTime = () => new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
const dayName = () => ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
const isMonday = () => new Date().getDay() === 1;
const avColor  = n => { let h=0; String(n||'').split('').forEach(c=>{h=(h*31+c.charCodeAt(0))%AV_COLORS.length}); return AV_COLORS[h]; };
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const bold     = t => t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
const api      = p => fetch(GAS,{method:'POST',body:JSON.stringify(p)}).then(r=>r.json());

function toast(msg, dur=2500){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(()=>t.classList.remove('show'), dur);
}

// ── Navigation ──────────────────────────────────────────────────
function goPage(name){
  document.querySelectorAll('.page,.chat-page').forEach(p=>{p.classList.remove('on')});
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  const page = document.getElementById('page-'+name);
  if(page){ page.classList.add('on'); }
  const navBtn = document.querySelector(`.nav-item[data-page="${name}"]`);
  if(navBtn) navBtn.classList.add('on');
  _currentPage = name;
  updateTopBar(name);
  if(name==='home')     renderHome();
  if(name==='log')      renderLog();
  if(name==='progress') renderProgress();
  if(name==='board')    renderBoard();
  if(name==='chat')     initChat();
}

function updateTopBar(page){
  const titles = { home:'FitBounty', log:'Log Weight', progress:'My Progress', board:'Rankings', chat:'Buddy AI' };
  const subs   = { home:dayName()+' · '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short'}), log:isMonday()?'Official weigh-in day 🟢':'Practice log', progress:'Your journey', board:'Who\'s leading', chat:'AI Assistant' };
  document.getElementById('tb-title').textContent = titles[page]||'FitBounty';
  document.getElementById('tb-sub').textContent   = subs[page]||'';
}

// ── Data ─────────────────────────────────────────────────────────
async function getLB(force){
  if(_lb && !force) return _lb;
  const d = await api({action:'getLeaderboard'});
  _lb = d.leaderboard || [];
  return _lb;
}

async function getMyW(force){
  if(_myW && !force) return _myW;
  return await getWeightsFor(S.user, true);
}

async function getWeightsFor(username, saveAsMyW){
  const k = username.toLowerCase();
  if(_otherW[k] && !saveAsMyW) return _otherW[k];
  const raw = await api({action:'getUserWeights', username});
  const rows = Array.isArray(raw) ? raw : [];
  const hasHdr = rows.length > 0 && isNaN(parseFloat(rows[0][2]));
  const parsed = (hasHdr ? rows.slice(1) : rows)
    .map(r=>({date:r[1], weight:parseFloat(r[2])}))
    .filter(r=>r.weight > 0)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
  _otherW[k] = parsed;
  if(saveAsMyW) _myW = parsed;
  return parsed;
}

async function logWeight(w){
  const d = await api({action:'addWeight', username:S.user, weight:w, geo:''});
  if(d.success){ _myW=null; _lb=null; delete _otherW[S.user.toLowerCase()]; }
  return d.success;
}

function refreshAll(){
  _lb=null; _myW=null; _otherW={};
  toast('Data refreshed ✓');
  goPage(_currentPage);
}

// ══════════════════════════════════════════════════════════════
// HOME PAGE
// ══════════════════════════════════════════════════════════════
async function renderHome(){
  const el = document.getElementById('page-home');
  el.innerHTML = `<div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>`;

  try{
    const [lb, weights] = await Promise.all([getLB(), getMyW()]);
    const me = lb.find(e=>e.name.toLowerCase()===S.user.toLowerCase());
    const rank = lb.findIndex(e=>e.name.toLowerCase()===S.user.toLowerCase())+1;
    const first = weights.length ? weights[0].weight : null;
    const last  = weights.length ? weights[weights.length-1].weight : null;
    const pct   = first && last ? ((first-last)/first*100).toFixed(1) : '0.0';
    const lostKg= first && last ? (first-last).toFixed(1) : '0';

    let html = ``;

    // Hero card
    html += `<div class="home-hero">
      <div class="home-hero-greeting">Welcome back</div>
      <div class="home-hero-name"><span>${S.user}</span> 👋</div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-val">${pct > 0 ? '−'+pct : pct}%</div>
          <div class="hero-stat-lbl">Total Loss</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val">#${rank||'—'}</div>
          <div class="hero-stat-lbl">Rank</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val">${weights.length}</div>
          <div class="hero-stat-lbl">Weigh-ins</div>
        </div>
      </div>
    </div>`;

    // Monday nudge or action row
    if(isMonday()){
      html += `<div style="margin:14px 16px 0">
        <div class="log-nudge" onclick="goPage('log')">
          <div class="log-nudge-icon">⚖️</div>
          <div class="log-nudge-text">
            <div class="log-nudge-title">Today is Weigh-In Day!</div>
            <div class="log-nudge-sub">Log your official Monday weight now</div>
          </div>
          <div class="log-nudge-arrow">›</div>
        </div>
      </div>`;
    }

    // Quick actions
    html += `<div class="home-actions">
      <div class="action-card primary" onclick="goPage('progress')">
        <div class="action-icon">📈</div>
        <div class="action-title">My Progress</div>
        <div class="action-sub">${lostKg > 0 ? '−'+lostKg+' kg lost' : 'View journey'}</div>
      </div>
      <div class="action-card" onclick="goPage('board')">
        <div class="action-icon">🏆</div>
        <div class="action-title">Rankings</div>
        <div class="action-sub">${lb.length} athletes</div>
      </div>
      <div class="action-card" onclick="goPage('log')">
        <div class="action-icon">⚖️</div>
        <div class="action-title">Log Weight</div>
        <div class="action-sub">${last ? 'Last: '+last+' kg' : 'Get started'}</div>
      </div>
      <div class="action-card" onclick="goPage('chat')">
        <div class="action-icon">🤖</div>
        <div class="action-title">Ask Buddy</div>
        <div class="action-sub">AI assistant</div>
      </div>
    </div>`;

    // Mini leaderboard
    html += `<div class="section-hd"><div class="section-title">Leaderboard</div><div class="section-link" onclick="goPage('board')">See all →</div></div>`;
    html += `<div class="mini-lb">`;
    lb.slice(0,5).forEach((e,i)=>{
      const isMe = e.name.toLowerCase()===S.user.toLowerCase();
      const pctVal = parseFloat(e.totalLossPct||0);
      html += `<div class="mini-lb-row" onclick="openUserModal('${esc(e.name)}')">
        <div class="mini-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
        <div class="mini-av" style="background:${avColor(e.name)}">${initials(e.name)}</div>
        <div style="flex:1">
          <div class="mini-name" style="${isMe?'color:var(--gold);font-weight:700':''}">${esc(e.name)}${isMe?' (you)':''}</div>
          <div class="mini-badge">${e.checkIns||0} weigh-ins</div>
        </div>
        <div class="mini-pct ${pctVal===0?'zero':''}">${pctVal>0?'−'+pctVal.toFixed(1)+'%':'0%'}</div>
      </div>`;
    });
    html += `</div>`;

    el.innerHTML = html;
  }catch(e){
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load data</div><div class="empty-sub">Check your connection and try again</div></div>`;
  }
}

// ══════════════════════════════════════════════════════════════
// LOG PAGE
// ══════════════════════════════════════════════════════════════
function renderLog(){
  const el = document.getElementById('page-log');
  el.innerHTML = buildLogHTML();
  bindNumpad();

function numInput(ch){
  if(ch==='.' && _weightInput.includes('.')) return;
  if(_weightInput.length >= 6) return;
  if(ch==='.' && _weightInput==='') _weightInput = '0';
  _weightInput += ch;
  updateWtDisplay();
}

function numDel(){
  _weightInput = _weightInput.slice(0,-1);
  updateWtDisplay();
}

function updateWtDisplay(){
  const d = document.getElementById('wt-display');
  const btn = document.getElementById('log-submit-btn');
  if(!d) return;
  d.textContent = _weightInput || '—';
  d.style.color = _weightInput ? 'var(--gold)' : '';
  if(btn) btn.disabled = !_weightInput || isNaN(parseFloat(_weightInput));
}

async function loadLogHistory(){
  const wrap = document.getElementById('log-history-wrap');
  if(!wrap) return;
  try{
    const weights = await getMyW();
    if(!weights.length){ wrap.innerHTML=''; return; }
    let h = `<div class="log-history-title">Weight History</div>`;
    const sorted = [...weights].reverse();
    sorted.forEach((w,i)=>{
      const prev = sorted[i+1];
      const delta = prev ? parseFloat((prev.weight - w.weight).toFixed(2)) : null;
      const isOfficialDay = new Date(w.date).getDay()===1;
      let deltaHtml = '';
      if(delta!==null){
        if(delta>0) deltaHtml=`<span class="log-delta loss">−${delta}kg</span>`;
        else if(delta<0) deltaHtml=`<span class="log-delta gain">+${Math.abs(delta)}kg</span>`;
        else deltaHtml=`<span class="log-delta neutral">—</span>`;
      }
      h += `<div class="log-row">
        <div class="log-dot ${isOfficialDay?'monday':'other'}"></div>
        <div class="log-date">${fmtDate(w.date)}${isOfficialDay?' <span class="badge-monday">Monday</span>':''}</div>
        <div class="log-wt">${w.weight.toFixed(1)} kg</div>
        ${deltaHtml}
      </div>`;
    });
    wrap.innerHTML = h;
  }catch(e){ wrap.innerHTML=''; }
}

async function submitLog(){
  const w = parseFloat(_weightInput);
  if(!w || w<20 || w>300){ toast('Enter a valid weight (20–300 kg)'); return; }
  const btn = document.getElementById('log-submit-btn');
  btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true;

  const ok = await logWeight(w);
  if(ok){
    toast(`✅ ${w} kg logged!`);
    _weightInput = '';
    updateWtDisplay();
    await loadLogHistory();
  } else {
    toast('Error logging weight. Try again.');
  }
  btn.innerHTML = 'Log Weight'; btn.disabled = false;
}

function drawLineChart(canvasId, weights, color){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 2;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width || canvas.offsetWidth || 320;
  const H = rect.height || 160;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const vals = weights.map(w=>w.weight);
  const minV = Math.min(...vals), maxV = Math.max(...vals), range = maxV - minV || 1;
  const pad = {l:8, r:8, t:12, b:24};
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;
  const xOf = i => pad.l + (i/(vals.length-1||1))*cW;
  const yOf = v => pad.t + (1 - (v-minV)/range)*cH;

  const trending = vals[vals.length-1] <= vals[0];
  const lc = color || (trending ? '#3ecf8e' : '#e05858');

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, H-pad.b);
  grad.addColorStop(0, lc.replace(')',',0.25)').replace('rgb','rgba').replace('#3ecf8e','rgba(62,207,142,0.25)').replace('#e05858','rgba(224,88,88,0.2)'));
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.beginPath();
  ctx.moveTo(xOf(0), H-pad.b);
  vals.forEach((v,i) => ctx.lineTo(xOf(i), yOf(v)));
  ctx.lineTo(xOf(vals.length-1), H-pad.b);
  ctx.closePath();
  ctx.fillStyle = trending ? 'rgba(62,207,142,.15)' : 'rgba(224,88,88,.12)';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = lc;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  vals.forEach((v,i) => i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v)));
  ctx.stroke();

  // Dots
  vals.forEach((v,i) => {
    const isLast = i === vals.length-1;
    ctx.beginPath();
    ctx.arc(xOf(i), yOf(v), isLast?5.5:3, 0, Math.PI*2);
    ctx.fillStyle = isLast ? lc : 'rgba(255,255,255,.15)';
    ctx.fill();
    if(isLast){
      ctx.strokeStyle = 'rgba(7,7,9,.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });

  // Date labels
  ctx.fillStyle = 'rgba(237,233,227,.3)';
  ctx.font = `10px 'Outfit',sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(fmtDate(weights[0].date), pad.l, H-6);
  ctx.textAlign = 'right';
  ctx.fillText(fmtDate(weights[weights.length-1].date), W-pad.r, H-6);

  // Weight labels at start/end
  ctx.fillStyle = lc;
  ctx.font = `bold 11px 'JetBrains Mono',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(vals[0].toFixed(1), xOf(0), yOf(vals[0])-8);
  ctx.fillText(vals[vals.length-1].toFixed(1), xOf(vals.length-1), yOf(vals[vals.length-1])-8);
}

async function cChip(type){
  const labels = {leaderboard:'🏆 Leaderboard',progress:'📊 My Progress',week:'📅 Week Stats',log:'⚖️ Log Weight',contest:'🎯 Contest Info'};
  cUserMsg(labels[type]||type);
  await handleChatIntent(type, '');

async function cSend(){
  const el = document.getElementById('c-txt');
  if(!el) return;
  const text = el.value.trim();
  if(!text) return;
  el.value=''; autoGrowC(el);
  cUserMsg(text);

  let intent = detectChatIntent(text);

  // Check if text mentions another user
  if(intent==='ai'){
    const lb = _lb || await getLB().catch(()=>[]);
    const mentioned = findMentionedUser(text, lb);
    if(mentioned && mentioned.toLowerCase()!==S.user.toLowerCase()) intent='other_user';
  }

  await handleChatIntent(intent, text);
}

function detectChatIntent(t){
  const l = t.toLowerCase();
  if(/\b(leaderboard|standings|ranking|who.?s (winning|leading)|top)\b/.test(l)) return 'leaderboard';
  if(/\b(my progress|how am i|my stats|my journey)\b/.test(l)) return 'progress';
  if(/\b(week|weekly|week on week|breakdown|wk stats)\b/.test(l)) return 'week';
  if(/\b(contest|challenge|prize|rules|penalty)\b/.test(l)) return 'contest';
  if(/\b(log|record|submit|weigh.?in|weight is|i weigh)\b/.test(l) || /\b\d{2,3}(\.\d)?\s*(kg)?\b/.test(l)) return 'log';
  return 'ai';
}

function findMentionedUser(text, lb){
  const t = text.toLowerCase();
  if(!lb) return null;
  for(const e of lb){
    const n = e.name.toLowerCase();
    if(t.includes(n)) return e.name;
    for(const part of n.split(/\s+/)){
      if(part.length>=3 && t.includes(part)) return e.name;
    }
  }
  return null;
}

async function handleChatIntent(intent, rawText){
  showCTyping();
  await new Promise(r=>setTimeout(r,350));

  if(intent==='other_user'){
    try{
      const lb = await getLB();
      const name = findMentionedUser(rawText, lb);
      const isWeek = /week/.test(rawText.toLowerCase());
      const ws = await getWeightsFor(name, false);
      hideCTyping();
      if(!ws.length){ cBotMsg(`${name} hasn't logged any weigh-ins yet!`); return; }
      const pct = ws.length>=2?((ws[0].weight-ws[ws.length-1].weight)/ws[0].weight*100).toFixed(1):0;
      cBotMsg(`**${name}** has lost **${pct}%** so far${isWeek?' — here\'s their week-by-week trend':' — opening their profile'}. Tap their name in the Rankings tab for a full chart!`);
    }catch(e){ hideCTyping(); cBotMsg("Couldn't look up that user. Try the Rankings tab!"); }
    return;
  }

  if(intent==='leaderboard'){
    try{
      const lb = await getLB();
      if(!lb.length){ hideCTyping(); cBotMsg('No data yet!'); return; }
      const top3 = lb.slice(0,3).map((e,i)=>`${['🥇','🥈','🥉'][i]} **${e.name}** — ${e.totalLossPct||0}%`).join('\n');
      hideCTyping();
      cBotMsg(`**Current Top 3:**\n\n${top3}\n\n${lb.length} athletes competing. Full standings in the Rankings tab! 🏆`);
    }catch(e){ hideCTyping(); cBotMsg('Could not load leaderboard.'); }
    return;
  }

  if(intent==='progress'){
    try{
      const [lb, ws] = await Promise.all([getLB(), getMyW()]);
      const me = lb.find(e=>e.name.toLowerCase()===S.user.toLowerCase());
      const rank = lb.findIndex(e=>e.name.toLowerCase()===S.user.toLowerCase())+1;
      hideCTyping();
      if(!ws.length){ cBotMsg("You haven't logged any weigh-ins yet. Tap ⚖️ Log to get started!"); return; }
      const pct = ((ws[0].weight-ws[ws.length-1].weight)/ws[0].weight*100).toFixed(1);
      cBotMsg(`**Your Progress Summary:**\n\nStart: **${ws[0].weight} kg** → Now: **${ws[ws.length-1].weight} kg**\nLost: **${(ws[0].weight-ws[ws.length-1].weight).toFixed(1)} kg** (${pct}%)\nRank: **#${rank}** of ${lb.length}\n\nHead to the Progress tab for your full chart 📈`);
    }catch(e){ hideCTyping(); cBotMsg('Could not load your data.'); }
    return;
  }

  if(intent==='week'){
    try{
      const ws = await getMyW();
      hideCTyping();
      if(ws.length<2){ cBotMsg("You need at least 2 weigh-ins to see week-on-week changes. Keep logging! 💪"); return; }
      const last3 = ws.slice(-3);
      const summary = last3.map((w,i)=>{
        const prev = last3[i-1];
        const d = prev ? (prev.weight-w.weight).toFixed(1) : null;
        return `${fmtDate(w.date)}: **${w.weight} kg**${d?` (${d>0?'−'+d:'+'+Math.abs(d)} kg)`:''}`;
      }).join('\n');
      cBotMsg(`**Recent Trend:**\n\n${summary}\n\nFull week table on the Progress tab 📅`);
    }catch(e){ hideCTyping(); cBotMsg('Could not load history.'); }
    return;
  }

  if(intent==='contest'){
    try{
      const lb = await getLB();
      const me = lb.find(e=>e.name.toLowerCase()===S.user.toLowerCase());
      const rank = lb.findIndex(e=>e.name.toLowerCase()===S.user.toLowerCase())+1;
      hideCTyping();
      cBotMsg(`**FitBounty Challenge 2026** 🎯\n\n• **${lb.length}** participants\n• Weekly Monday weigh-ins\n• Highest % weight loss wins\n• ₹500 penalty for missed weigh-in\n\n${me?`Your rank: **#${rank}** · Loss: **${me.totalLossPct}%**`:'You\'re not in the leaderboard yet!'}`);
    }catch(e){ hideCTyping(); cBotMsg('Could not load contest info.'); }
    return;
  }

  if(intent==='log'){
    const w = rawText.match(/\b(\d{2,3}(?:\.\d{1,2})?)\s*(?:kg)?\b/i);
    const wVal = w ? parseFloat(w[1]) : null;
    if(wVal && wVal>=20 && wVal<=300){
      hideCTyping();
      _pendingWt = wVal;
      cBotMsg(
        `Got it — **${wVal} kg** ⚖️\n\n${isMonday()?'Today is Monday — this will be your **official weigh-in**!':'Practice log — Mondays count officially.'}\n\nShall I log this?`,
        [{label:'✓ Log '+wVal+' kg',fn:'cConfirmLog()',cls:'confirm'},{label:'✗ Cancel',fn:'cCancelLog()',cls:'cancel'}]
      );
    } else {
      hideCTyping();
      cBotMsg("Sure! What's your weight? Type a number (e.g. **82.5**) or tap 📷 to upload your scale photo.");
    }
    return;
  }

  // AI fallback
  try{
    const [lb, ws] = await Promise.all([getLB().catch(()=>[]), getMyW().catch(()=>[])]);
    const me = lb.find(e=>e.name.toLowerCase()===S.user.toLowerCase());
    const rank = lb.findIndex(e=>e.name.toLowerCase()===S.user.toLowerCase())+1;
    const first = ws.length?ws[0].weight:null;
    const last  = ws.length?ws[ws.length-1].weight:null;

    const sysContext = `You are Buddy, a friendly FitBounty weight-loss challenge assistant.
User: ${S.user}
Rank: ${rank||'?'} of ${lb.length}
Total loss: ${me?me.totalLossPct:0}%
Start: ${first||'?'} kg | Current: ${last||'?'} kg | Weigh-ins: ${ws.length}
Today: ${dayName()}
Rules: Be concise (2-4 sentences), warm, data-aware. Use real stats. Address yourself as Buddy. Max 2 emojis.`;

    const resp = await puter.ai.chat([{role:'user',content:sysContext+'\n\nUser asked: '+rawText}],{model:'gpt-4o-mini'});
    const reply = typeof resp==='string'?resp:(resp?.message?.content||'Keep pushing! 💪');
    hideCTyping();
    cBotMsg(reply);
  }catch(e){
    hideCTyping();
    cBotMsg("I'm here! Keep logging your weigh-ins every Monday — consistency is everything. 💪");
  }
}

async function cConfirmLog(){
  if(!_pendingWt) return;
  const w = _pendingWt; _pendingWt = null;
  document.querySelectorAll('.cmac').forEach(b=>b.disabled=true);
  showCTyping();
  const ok = await logWeight(w);
  hideCTyping();
  if(ok) cBotMsg(`✅ **${w} kg** logged successfully!\n\nCheck your Progress tab to see the update 🎯`);
  else cBotMsg('Something went wrong. Try again from the Log tab.');
}

function cCancelLog(){
  _pendingWt = null;
  document.querySelectorAll('.cmac').forEach(b=>b.disabled=true);
  cBotMsg('Cancelled. No weight was logged.');
}

// ══════════════════════════════════════════════════════════════
// PHOTO HANDLING
// ══════════════════════════════════════════════════════════════
async function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  e.target.value='';

  const reader = new FileReader();
  reader.onload = async ev => {
    const dataUrl = ev.target.result;

    if(_currentPage==='chat'){
      cUserImg(dataUrl);
      showCTyping();
      await new Promise(r=>setTimeout(r,500));
      const wt = await readScalePhoto(dataUrl);
      hideCTyping();
      if(wt){
        _pendingWt = wt;
        cBotMsg(`I can see **${wt} kg** on your scale ⚖️\n\n${isMonday()?'Official weigh-in day!':'Practice log.'} Shall I log **${wt} kg**?`,
          [{label:'✓ Log '+wt+' kg',fn:'cConfirmLog()',cls:'confirm'},{label:'✗ Cancel',fn:'cCancelLog()',cls:'cancel'}]);
      } else {
        cBotMsg("Couldn't read the weight clearly 🤔\n\nTry a close-up, well-lit photo of the display, or type your weight manually.");
      }
    } else if(_currentPage==='log'){
      // Show photo reading state
      toast('Reading scale…');
      const wt = await readScalePhoto(dataUrl);
      if(wt && wt>=20 && wt<=300){
        _weightInput = String(wt);
        updateWtDisplay();
        toast(`Read: ${wt} kg ✓`);
      } else {
        toast('Could not read weight. Enter manually.');
      }
    }
  };
  reader.readAsDataURL(file);
}

async function readScalePhoto(dataUrl){
  try{
    const resp = await puter.ai.chat([{role:'user',content:[
      {type:'image_url',image_url:{url:dataUrl}},
      {type:'text',text:'Read the exact digits on this weighing scale display. Reply with ONLY the number (e.g. 82.3) or "unclear" if unreadable. Nothing else.'}
    ]}],{model:'gpt-4o'});
    const raw = typeof resp==='string'?resp:(resp?.message?.content||'');
    const num = parseFloat(raw.trim().replace(/[^0-9.]/g,''));
    return isNaN(num)||num<20||num>300 ? null : num;
  }catch(e){ return null; }
}

// ══════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════
function authTab(t){
  document.getElementById('tab-si').classList.toggle('on', t==='si');
  document.getElementById('tab-su').classList.toggle('on', t==='su');
  document.getElementById('form-si').style.display = t==='si'?'':'none';
  document.getElementById('form-su').style.display = t==='su'?'':'none';
  document.getElementById('auth-err').style.display = 'none';
}

function showAuthErr(m){ const e=document.getElementById('auth-err'); e.textContent=m; e.style.display=''; }

async function doLogin(){
  const u=document.getElementById('li-u').value.trim();
  const p=document.getElementById('li-p').value;
  if(!u||!p){ showAuthErr('Enter username and password'); return; }
  const btn=document.getElementById('li-btn');
  btn.innerHTML='<div class="spin"></div>'; btn.disabled=true;
  try{
    const d = await api({action:'authenticate', username:u, password:p});
    if(d.success){ S.set(u.toLowerCase()); startApp(); }
    else showAuthErr(d.message||'Invalid credentials');
  }catch(e){ showAuthErr('Connection error. Try again.'); }
  btn.innerHTML='Sign In →'; btn.disabled=false;
}

async function doRegister(){
  const n=document.getElementById('rg-n').value.trim();
  const u=document.getElementById('rg-u').value.trim().toLowerCase();
  const ph=document.getElementById('rg-ph').value.trim();
  const p=document.getElementById('rg-p').value;
  if(!n||!u||!ph||!p){ showAuthErr('Fill in all fields'); return; }
  const btn=document.getElementById('rg-btn');
  btn.innerHTML='<div class="spin"></div>'; btn.disabled=true;
  try{
    const d = await api({action:'registerUser', username:u, email:ph, password:p});
    if(d.success){ S.set(u); startApp(); }
    else showAuthErr(d.message||'Registration failed');
  }catch(e){ showAuthErr('Connection error. Try again.'); }
  btn.innerHTML='Create Account →'; btn.disabled=false;
}

document.getElementById('li-p').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('li-u').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('li-p').focus(); });

function doLogout(){
  if(!confirm('Log out?')) return;
  S.clear();
  _lb=null; _myW=null; _otherW={}; _chatHistory=[]; _chatInited=false; _weightInput='';
  document.getElementById('s-app').classList.remove('on');
  document.getElementById('s-auth').classList.add('on');
}

// ── Start ──────────────────────────────────────────────────────
function startApp(){
  document.getElementById('s-auth').classList.remove('on');
  document.getElementById('s-app').classList.add('on');
  const av = document.getElementById('user-av');
  av.textContent = initials(S.user);
  av.style.background = avColor(S.user);
  goPage('home');
}

function autoGrowC(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

// Boot
if(S.user) startApp();
