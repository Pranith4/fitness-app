<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0">
<meta name="theme-color" content="#080810">
<title>FitBounty — Earn Your Bounty.</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

:root{
--bg:#080810;
--bg2:#0f0f1c;
--bg3:#141428;
--surf:#191930;
--surf2:#1f1f3a;
--surf3:#252548;
--gold:#f5c842;
--red:#ff3b3b;
--green:#00e676;
--blue:#4fc3f7;
--text:#f5f0ff;
--text2:rgba(245,240,255,0.52);
--text3:rgba(245,240,255,0.25);
--fd:'Bebas Neue',sans-serif;
--fb:'Bricolage Grotesque',sans-serif;
--fm:'DM Mono',monospace;
}

body{
font-family:var(--fb);
background:var(--bg);
color:var(--text);
margin:0;
}

#cr-map{
height:260px;
width:100%;
border-radius:14px;
}

#route-detail-map{
height:260px;
width:100%;
border-radius:14px;
}

</style>
</head>
<body>
<div id="map-container">
<div id="cr-map"></div>
</div>

<div style="padding:20px">

<h2>Route Builder</h2>

<div style="margin-bottom:10px">
Distance:
<span id="cr-dist">0 m</span>
</div>

<button onclick="clearRoute()">Clear Route</button>

</div>
<script>

let crMap=null
let crMarkers=[]
let crPolyline=null
let crPath=[]

function initCreateMap(){

const mapEl=document.getElementById("cr-map")

if(!mapEl) return

crMap=L.map(mapEl).setView([12.9716,77.5946],13)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}).addTo(crMap)

crPolyline=L.polyline([],{
color:"#4fc3f7",
weight:4
}).addTo(crMap)

crMap.on("click",function(e){
addWaypoint(e.latlng)
})

}

function addWaypoint(latlng){

crPath.push(latlng)

const marker=L.circleMarker(latlng,{
radius:6,
color:"#fff",
weight:2,
fillColor:"#f5c842",
fillOpacity:1
}).addTo(crMap)

crMarkers.push(marker)

crPolyline.setLatLngs(crPath)

updateRouteDist()

}

function updateRouteDist(){

if(crPath.length<2){

document.getElementById("cr-dist").textContent="0 m"
return

}

let dist=0

for(let i=1;i<crPath.length;i++){

dist+=crPath[i-1].distanceTo(crPath[i])

}

document.getElementById("cr-dist").textContent=
dist>1000
?(dist/1000).toFixed(2)+" km"
:Math.round(dist)+" m"

}

function clearRoute(){

crMarkers.forEach(m=>crMap.removeLayer(m))

crMarkers=[]
crPath=[]

crPolyline.setLatLngs([])

updateRouteDist()

}

document.addEventListener("DOMContentLoaded",()=>{

setTimeout(initCreateMap,500)

})

</script>
</body>
</html>
