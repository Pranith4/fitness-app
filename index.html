<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0">
<meta name="theme-color" content="#09090f">
<title>FitBounty</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--bg2:#0f0f18;--surf:#1a1a28;--surf2:#20202f;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.12);
  --gold:#d4a853;--gold2:#b88a3a;--goldfaint:rgba(212,168,83,.08);
  --green:#3ecf8e;--greenfaint:rgba(62,207,142,.07);
  --red:#e05555;--blue:#5b8dee;
  --text:#e8e6f0;--text2:rgba(232,230,240,.5);--text3:rgba(232,230,240,.22);
  --fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:10px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:15px}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--surf2)}

/* ── SCREENS ── */
.scr{display:none;height:100dvh;flex-direction:column}
.scr.on{display:flex}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;padding:28px 20px;background:var(--bg)}
.lcard{width:100%;max-width:390px;background:var(--bg2);border:1px solid var(--brd2);border-radius:20px;padding:36px 28px;
  box-shadow:0 40px 80px rgba(0,0,0,.6);animation:rise .45s cubic-bezier(.22,1,.36,1) both}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.llogo{text-align:center;margin-bottom:32px}
.lmark{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;
  background:var(--goldfaint);border:1px solid rgba(212,168,83,.25);border-radius:16px;margin-bottom:14px}
.lbrand{font-family:var(--fd);font-size:2.2rem;font-weight:800;color:var(--gold);line-height:1}
.ltag{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.ftgl{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:8px;padding:3px;margin-bottom:24px}
.ftb{flex:1;padding:10px 8px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-family:var(--fb);font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
.ftb.on{background:var(--gold);color:#09090f}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text3);margin-bottom:6px;text-transform:uppercase}
.fi{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);color:var(--text);border:1.5px solid var(--brd);border-radius:var(--r);font-family:var(--fb);font-size:14px;transition:all .18s;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--gold);background:rgba(212,168,83,.04)}
.fi::placeholder{color:var(--text3)}
.emsg{background:rgba(224,85,85,.07);border:1px solid rgba(224,85,85,.2);border-radius:var(--r);padding:10px 14px;font-size:13px;font-weight:500;color:var(--red);margin-bottom:14px;display:none}
.bsub{width:100%;padding:15px;background:var(--gold);color:#09090f;border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.bsub:hover{background:var(--gold2)}
.bsub:disabled{background:var(--surf2);color:var(--text3);cursor:not-allowed}
.spin{width:16px;height:16px;border:2px solid rgba(9,9,15,.2);border-top-color:#09090f;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── CHAT SCREEN ── */
#s-chat{background:var(--bg);max-width:480px;margin:0 auto}

/* Header */
#chat-header{
  padding:calc(var(--st) + 14px) 18px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(9,9,15,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--brd);flex-shrink:0;
}
.ch-left{display:flex;align-items:center;gap:10px}
.ch-av{width:38px;height:38px;border-radius:10px;background:var(--goldfaint);border:1px solid rgba(212,168,83,.25);display:flex;align-items:center;justify-content:center;font-size:18px}
.ch-name{font-family:var(--fd);font-size:1.15rem;font-weight:800;color:var(--gold)}
.ch-status{font-size:11px;color:var(--green);margin-top:1px}
.ch-actions{display:flex;gap:6px}
.ch-btn{width:34px;height:34px;border-radius:8px;border:none;cursor:pointer;background:var(--surf);border:1px solid var(--brd);color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.ch-btn:active{transform:scale(.88)}

/* Messages */
#messages{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;
}

.msg{display:flex;flex-direction:column;max-width:88%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end}

.bubble{
  padding:11px 14px;font-size:14px;line-height:1.55;word-break:break-word;
}
.bot .bubble{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:18px 18px 18px 4px;color:var(--text);
}
.user .bubble{
  background:var(--gold);color:#09090f;font-weight:500;
  border-radius:18px 18px 4px 18px;
}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px}
.bot .msg-time{margin-left:4px}
.user .msg-time{margin-right:4px;text-align:right}

/* Card image bubble */
.card-bubble{
  width:100%;border-radius:14px;overflow:hidden;
  border:1px solid var(--brd);margin-top:2px;cursor:pointer;
  transition:transform .18s;
}
.card-bubble:active{transform:scale(.97)}
.card-bubble img{width:100%;display:block}
.card-caption{font-size:11px;color:var(--text3);margin-top:4px;margin-left:4px}

/* Social share icons */
.share-row{display:flex;align-items:center;gap:10px;margin-top:8px;margin-left:2px}
.share-label{font-size:11px;color:var(--text3);font-weight:500}
.share-icon{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .18s,opacity .18s;text-decoration:none;border:none;
  flex-shrink:0;
}
.share-icon:active{transform:scale(.85)}
.share-icon:hover{opacity:.85}
.share-icon.wa{background:#25D366}
.share-icon.fb{background:#1877F2}
.share-icon.ig{background:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%)}
.share-icon svg{width:16px;height:16px;fill:#fff}

/* User image bubble */
.img-bubble{border-radius:14px;overflow:hidden;border:1px solid var(--brd);margin-top:2px;max-width:220px}
.img-bubble img{width:100%;display:block}

/* Typing indicator */
.typing-bubble{background:var(--surf);border:1px solid var(--brd);border-radius:18px 18px 18px 4px;padding:13px 16px;display:flex;align-items:center;gap:5px}
.tdot{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:tdot 1s infinite}
.tdot:nth-child(2){animation-delay:.15s}
.tdot:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-8px);opacity:1}}

/* Action buttons inside messages */
.msg-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.mac{padding:7px 14px;border-radius:20px;border:1px solid var(--brd2);background:transparent;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:all .18s;white-space:nowrap}
.mac:hover{background:var(--goldfaint)}
.mac.confirm{background:var(--gold);color:#09090f;border-color:var(--gold)}
.mac.cancel{color:var(--text2);border-color:var(--brd)}

/* Chip bar */
#chip-bar{
  padding:10px 14px 6px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
#chip-bar::-webkit-scrollbar{display:none}
.chip{
  padding:8px 14px;border-radius:20px;border:1px solid var(--brd2);
  background:var(--surf);color:var(--text);font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;font-family:var(--fb);
}
.chip:active{transform:scale(.94)}
.chip:hover{border-color:var(--gold);color:var(--gold)}

/* Input bar */
#input-bar{
  padding:10px 14px calc(10px + var(--sb));
  display:flex;align-items:flex-end;gap:8px;
  border-top:1px solid var(--brd);flex-shrink:0;
  background:rgba(9,9,15,.97);backdrop-filter:blur(20px);
}
#txt-input{
  flex:1;background:var(--surf);border:1px solid var(--brd);border-radius:22px;
  padding:11px 16px;color:var(--text);font-size:14px;resize:none;
  max-height:100px;overflow-y:auto;font-family:var(--fb);line-height:1.4;
}
#txt-input:focus{outline:none;border-color:rgba(212,168,83,.4)}
#txt-input::placeholder{color:var(--text3)}
.ibt{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all .18s;flex-shrink:0;
}
.ibt:active{transform:scale(.88)}
#cam-btn{background:var(--surf);border:1px solid var(--brd);color:var(--text2)}
#send-btn{background:var(--gold);color:#09090f}
#send-btn:disabled{background:var(--surf2);color:var(--text3)}

/* Bold text in bubble */
.bubble b, .bubble strong{font-weight:700}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="s-login" class="scr on">
  <div class="lcard">
    <div class="llogo">
      <div class="lmark"><span style="font-size:28px">⚡</span></div>
      <div class="lbrand">FitBounty</div>
      <div class="ltag">Meet Buddy, your assistant</div>
    </div>
    <div class="ftgl">
      <button class="ftb on" id="t-sign" onclick="authTab('sign')">Sign In</button>
      <button class="ftb" id="t-join" onclick="authTab('join')">Join</button>
    </div>
    <div id="auth-err" class="emsg"></div>
    <div id="form-sign">
      <div class="fg"><label class="fl">Username</label><input class="fi" id="li-u" type="text" placeholder="your_username" autocapitalize="none" autocomplete="username"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" id="li-p" type="password" placeholder="••••••••"></div>
      <button class="bsub" id="li-btn" onclick="doLogin()">Sign In</button>
    </div>
    <div id="form-join" style="display:none">
      <div class="fg"><label class="fl">Full Name</label><input class="fi" id="rg-n" type="text" placeholder="Your Name" autocapitalize="words"></div>
      <div class="fg"><label class="fl">Username</label><input class="fi" id="rg-u" type="text" placeholder="choose_username" autocapitalize="none"></div>
      <div class="fg"><label class="fl">WhatsApp</label><input class="fi" id="rg-ph" type="tel" placeholder="+91 98765 43210"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" id="rg-p" type="password" placeholder="Create a password"></div>
      <button class="bsub" id="rg-btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- ── CHAT ── -->
<div id="s-chat" class="scr">
  <div id="chat-header">
    <div class="ch-left">
      <div class="ch-av">🤖</div>
      <div>
        <div class="ch-name">Buddy</div>
        <div class="ch-status" id="coach-status">● FitBounty Assistant</div>
      </div>
    </div>
    <div class="ch-actions">
      <button class="ch-btn" onclick="refreshData()" title="Refresh data">↻</button>
      <button class="ch-btn" onclick="doLogout()" title="Logout">⏏</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="chip-bar">
    <button class="chip" onclick="chipAction('leaderboard')">🏆 Leaderboard</button>
    <button class="chip" onclick="chipAction('progress')">📊 My Progress</button>
    <button class="chip" onclick="chipAction('week')">📅 My Week Stats</button>
    <button class="chip" onclick="chipAction('log')">⚖️ Log Weight</button>
    <button class="chip" onclick="chipAction('contest')">🎯 Contest Info</button>
    <button class="chip" onclick="chipAction('buddy')">💬 Ask Buddy</button>
  </div>

  <div id="input-bar">
    <label for="cam-input">
      <button class="ibt" id="cam-btn" onclick="document.getElementById('cam-input').click()" title="Upload scale photo">📷</button>
    </label>
    <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="handleImageUpload(event)">
    <textarea id="txt-input" placeholder="Ask Buddy anything…" rows="1" oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"></textarea>
    <button class="ibt" id="send-btn" onclick="sendText()">➤</button>
  </div>
</div>

<!-- Hidden canvas for card rendering -->
<canvas id="card-canvas" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
// FITBOUNTY CHAT — BUDDY
// ═══════════════════════════════════════════════════════════════

const GAS = 'https://script.google.com/macros/s/AKfycbzwWrCRjHYeJA0-5SHxAamG-H96m5ItJzOXtNhgu0sy43xIlkCPLTeayK6bKT1-S9-Raw/exec';
const ADMIN_USERS = ['admin'];
const AV_COLORS   = ['#c47c3a','#3a8ec4','#3ac47c','#8e3ac4','#c43a6a','#3ac4b4','#a45ca4','#5ca4a4'];

// ── Session ──────────────────────────────────────────────────
const S = {
  get user(){ return localStorage.getItem('fb_user') || null },
  set(u){ localStorage.setItem('fb_user', u) },
  clear(){ localStorage.removeItem('fb_user'); localStorage.removeItem('fb_messages'); }
};

// ── State ────────────────────────────────────────────────────
let _cachedLB         = null;
let _cachedWeights    = null;
let _cachedOtherW     = {};   // cache for other users' weights keyed by username
let _pendingWeight    = null;
let _chatHistory      = [];
let _typing           = null;

// ── Utility ──────────────────────────────────────────────────
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
function fmtTime(){ return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function avColor(name){ let h=0;String(name||'').split('').forEach(c=>{h=(h*31+c.charCodeAt(0))%AV_COLORS.length;});return AV_COLORS[h]; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
async function gasAPI(payload){ const r=await fetch(GAS,{method:'POST',body:JSON.stringify(payload)});return r.json(); }

// ── Canvas card renderer ──────────────────────────────────────
const canvas = document.getElementById('card-canvas');
const ctx    = canvas.getContext('2d');
const DPR    = 2;

function setupCanvas(w, h){
  canvas.width  = w * DPR;
  canvas.height = h * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#09090f';
  ctx.fillRect(0, 0, w, h);
  const g = ctx.createLinearGradient(0,0,w,0);
  g.addColorStop(0,   'rgba(212,168,83,.07)');
  g.addColorStop(.5,  'rgba(212,168,83,.04)');
  g.addColorStop(1,   'rgba(62,207,142,.04)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, 3);
}

function cardHeader(w, title, sub){
  ctx.fillStyle = '#d4a853';
  ctx.font = '700 10px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('⚡ FITBOUNTY', 22, 24);
  ctx.fillStyle = 'rgba(232,230,240,.22)';
  ctx.font = '400 10px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(fmtDate(new Date()), w-22, 24);
  ctx.fillStyle = '#e8e6f0';
  ctx.font = '700 24px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(title, w/2, 58);
  if(sub){
    ctx.fillStyle = 'rgba(232,230,240,.35)';
    ctx.font = '400 12px Arial';
    ctx.fillText(sub, w/2, 76);
  }
  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(22, sub?88:72); ctx.lineTo(w-22, sub?88:72); ctx.stroke();
  return sub ? 98 : 82;
}

function renderLeaderboardCard(entries, contestName){
  const W = 560, rowH = 52, headerH = 100;
  const H = headerH + Math.min(entries.length,8)*rowH + 24;
  setupCanvas(W, H);
  let y = cardHeader(W, 'LEADERBOARD', contestName ? contestName.slice(0,36) : null);

  entries.slice(0,8).forEach((e, i) => {
    const midY = y + rowH/2;
    if(i === 0){
      ctx.fillStyle = 'rgba(212,168,83,.05)';
      ctx.fillRect(0, y, W, rowH);
    }
    const icons = ['🥇','🥈','🥉'];
    if(i < 3){
      ctx.font = '18px serif';
      ctx.textAlign = 'center';
      ctx.fillText(icons[i], 26, midY+6);
    } else {
      ctx.fillStyle = 'rgba(232,230,240,.28)';
      ctx.font = '500 13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('#'+(i+1), 26, midY+5);
    }
    ctx.fillStyle = avColor(e.name);
    ctx.beginPath(); ctx.arc(60, midY, 15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '700 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(initials(e.name), 60, midY+4);
    ctx.fillStyle = i===0 ? '#d4a853' : '#e8e6f0';
    ctx.font = `${i===0?'600':'500'} ${i===0?15:14}px Arial`;
    ctx.textAlign = 'left';
    const isMe = e.name.toLowerCase() === S.user?.toLowerCase();
    ctx.fillText(e.name + (isMe?' (you)':''), 84, midY+5);
    ctx.fillStyle = 'rgba(232,230,240,.28)';
    ctx.font = '400 11px Arial';
    ctx.fillText(`${e.checkIns||0} weigh-ins`, 84, midY+18);
    const pct = parseFloat(e.totalLossPct || e.total || 0);
    ctx.fillStyle = pct > 0 ? '#3ecf8e' : 'rgba(232,230,240,.35)';
    ctx.font = `700 ${i===0?17:15}px "Courier New",monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(pct > 0 ? '−'+pct.toFixed(1)+'%' : '0%', W-22, midY+6);
    ctx.strokeStyle = 'rgba(255,255,255,.045)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(22, y+rowH); ctx.lineTo(W-22, y+rowH); ctx.stroke();
    y += rowH;
  });
  return canvas.toDataURL('image/png');
}

function renderProgressCard(weights, username){
  const W = 560, H = 300;
  setupCanvas(W, H);
  let y = cardHeader(W, username.toUpperCase() + "'S PROGRESS");

  if(!weights.length){
    ctx.fillStyle = 'rgba(232,230,240,.3)';
    ctx.font = '400 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('No weigh-ins logged yet', W/2, H/2);
    return canvas.toDataURL('image/png');
  }

  const first = weights[0].weight;
  const last  = weights[weights.length-1].weight;
  const lostKg = parseFloat((first - last).toFixed(2));
  const lostPct = parseFloat(((first-last)/first*100).toFixed(1));

  ctx.fillStyle = lostPct > 0 ? '#3ecf8e' : '#e05555';
  ctx.font = '700 42px "Courier New",monospace';
  ctx.textAlign = 'center';
  ctx.fillText((lostPct>0?'−':'+') + Math.abs(lostPct) + '%', W/2, y+42);
  ctx.fillStyle = 'rgba(232,230,240,.35)';
  ctx.font = '400 11px Arial';
  ctx.fillText('TOTAL BODY LOSS', W/2, y+60);
  y += 76;

  if(weights.length >= 2){
    const vals = weights.map(w=>w.weight);
    const minW = Math.min(...vals), maxW = Math.max(...vals), range = maxW - minW || 1;
    const cLeft=28, cRight=W-28, cTop=y, cBot=y+80;
    const cW=cRight-cLeft, cH=cBot-cTop;
    const xOf = i => cLeft + (i/(vals.length-1))*cW;
    const yOf = v => cBot - ((v-minW)/range)*cH;
    const trending = vals[vals.length-1] <= vals[0];
    const lc = trending ? '#3ecf8e' : '#e05555';

    const grd = ctx.createLinearGradient(0, cTop, 0, cBot);
    grd.addColorStop(0, trending?'rgba(62,207,142,.3)':'rgba(224,85,85,.3)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.moveTo(xOf(0), cBot);
    vals.forEach((v,i) => ctx.lineTo(xOf(i), yOf(v)));
    ctx.lineTo(xOf(vals.length-1), cBot);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = lc;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    vals.forEach((v,i) => i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v)));
    ctx.stroke();

    vals.forEach((v,i) => {
      ctx.fillStyle = i===vals.length-1 ? lc : 'rgba(232,230,240,.15)';
      ctx.beginPath(); ctx.arc(xOf(i), yOf(v), i===vals.length-1?5:3, 0, Math.PI*2); ctx.fill();
    });

    ctx.fillStyle = 'rgba(232,230,240,.22)';
    ctx.font = '400 10px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(fmtDate(weights[0].date), cLeft, cBot+14);
    ctx.textAlign = 'right';
    ctx.fillText(fmtDate(weights[weights.length-1].date), cRight, cBot+14);
    y = cBot + 24;
  }

  const stats = [
    ['START', first.toFixed(1)+' kg'],
    ['NOW',   last.toFixed(1)+' kg'],
    ['LOST',  (lostKg>0?'−':'+') + Math.abs(lostKg)+' kg'],
    ['WEIGH-INS', weights.length]
  ];
  const boxW = (W-44) / stats.length;
  stats.forEach((st, i) => {
    const bx = 22 + i*boxW;
    ctx.fillStyle = 'rgba(255,255,255,.04)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx, y, boxW-8, 38, 6) : ctx.rect(bx, y, boxW-8, 38);
    ctx.fill();
    ctx.fillStyle = 'rgba(232,230,240,.28)';
    ctx.font = '600 9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(st[0], bx+boxW/2-4, y+13);
    ctx.fillStyle = i===2 && lostKg>0 ? '#3ecf8e' : '#e8e6f0';
    ctx.font = '700 13px "Courier New",monospace';
    ctx.fillText(st[1], bx+boxW/2-4, y+29);
  });

  return canvas.toDataURL('image/png');
}

function renderWeekCard(weights, username){
  const W = 560;
  const rows = [];
  const sorted = [...weights].sort((a,b)=>new Date(a.date)-new Date(b.date));
  sorted.forEach((w,i) => {
    const prev  = i > 0 ? sorted[i-1].weight : null;
    const dKg   = prev ? parseFloat((prev-w.weight).toFixed(2)) : null;
    const dPct  = prev ? parseFloat(((prev-w.weight)/prev*100).toFixed(1)) : null;
    rows.push({ date:w.date, weight:w.weight, dKg, dPct });
  });

  const ROW = 44, H = 100 + rows.length*ROW + 20;
  setupCanvas(W, H);
  let y = cardHeader(W, (username||'').toUpperCase() + ' · WEEK BY WEEK');

  const cols = [{l:'DATE',x:28},{l:'WEIGHT',x:180},{l:'CHANGE (kg)',x:300},{l:'CHANGE (%)',x:430}];
  cols.forEach(c => {
    ctx.fillStyle = 'rgba(212,168,83,.6)';
    ctx.font = '700 9px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(c.l, c.x, y+12);
  });
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(22,y+18); ctx.lineTo(W-22,y+18); ctx.stroke();
  y += 22;

  [...rows].reverse().forEach((r,i) => {
    const ry = y + i*ROW;
    const midY = ry + ROW/2;

    if(i===0){
      ctx.fillStyle = 'rgba(212,168,83,.04)';
      ctx.fillRect(0, ry, W, ROW);
    }

    ctx.fillStyle = i===0?'#d4a853':'rgba(232,230,240,.75)';
    ctx.font = `${i===0?'600':'400'} 13px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(fmtDate(r.date)+(i===0?' ★':''), 28, midY+5);

    ctx.fillStyle = '#e8e6f0';
    ctx.font = '500 13px "Courier New",monospace';
    ctx.fillText(r.weight.toFixed(1)+' kg', 180, midY+5);

    if(r.dKg !== null){
      ctx.fillStyle = r.dKg > 0 ? '#3ecf8e' : r.dKg < 0 ? '#e05555' : 'rgba(232,230,240,.3)';
      ctx.font = '600 13px "Courier New",monospace';
      ctx.fillText(r.dKg>0?'−'+r.dKg:r.dKg<0?'+'+Math.abs(r.dKg):'0', 300, midY+5);
      ctx.fillText(r.dPct>0?'−'+r.dPct+'%':r.dPct<0?'+'+Math.abs(r.dPct)+'%':'0%', 430, midY+5);
    } else {
      ctx.fillStyle = 'rgba(232,230,240,.22)';
      ctx.font = '400 12px Arial';
      ctx.fillText('—', 300, midY+5);
      ctx.fillText('—', 430, midY+5);
    }

    ctx.strokeStyle = 'rgba(255,255,255,.04)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(22,ry+ROW); ctx.lineTo(W-22,ry+ROW); ctx.stroke();
  });

  return canvas.toDataURL('image/png');
}

// ── Message persistence ───────────────────────────────────────
const MAX_STORED_MSGS = 60;

function saveMessages(){
  try{
    const container = document.getElementById('messages');
    const msgs = [];
    container.querySelectorAll('.msg').forEach(el => {
      if(el.querySelector('.typing-bubble')) return;
      msgs.push({ type: el.classList.contains('user') ? 'user' : 'bot', html: el.innerHTML });
    });
    localStorage.setItem('fb_messages', JSON.stringify(msgs.slice(-MAX_STORED_MSGS)));
  }catch(e){}
}

function restoreMessages(){
  try{
    const raw = localStorage.getItem('fb_messages');
    if(!raw) return false;
    const msgs = JSON.parse(raw);
    if(!msgs || !msgs.length) return false;
    const container = document.getElementById('messages');
    container.innerHTML = '';
    msgs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + m.type;
      div.innerHTML = m.html;
      // Disable stale action buttons
      div.querySelectorAll('.mac').forEach(b => b.disabled = true);
      container.appendChild(div);
    });
    scrollDown();
    return true;
  }catch(e){ return false; }
}

// ── Message rendering ─────────────────────────────────────────
function scrollDown(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }

function parseBold(text){
  // Convert **text** to <strong>text</strong>
  return text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}

function addBotText(text, actions){
  const div = document.createElement('div');
  div.className = 'msg bot';
  const formatted = parseBold(text).replace(/\n/g,'<br>');
  let html = `<div class="bubble">${formatted}</div>`;
  html += `<div class="msg-time">${fmtTime()}</div>`;
  if(actions && actions.length){
    html += '<div class="msg-actions">' + actions.map(a=>
      `<button class="mac${a.cls?' '+a.cls:''}" onclick="${a.fn}">${a.label}</button>`
    ).join('') + '</div>';
  }
  div.innerHTML = html;
  document.getElementById('messages').appendChild(div);
  scrollDown();
  saveMessages();
  return div;
}

function addUserText(text){
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${esc(text).replace(/\n/g,'<br>')}</div><div class="msg-time">${fmtTime()}</div>`;
  document.getElementById('messages').appendChild(div);
  scrollDown();
  saveMessages();
}

async function getLeaderboard(){
  if(_cachedLB) return _cachedLB;
  const d = await gasAPI({ action:'getLeaderboard' });
  _cachedLB = d.leaderboard || [];
  return _cachedLB;
}

async function getMyWeights(){
  if(_cachedWeights) return _cachedWeights;
  return await getWeightsForUser(S.user, true);
}

async function getWeightsForUser(username, saveToMyCache){
  const uKey = username.toLowerCase();
  if(_cachedOtherW[uKey]) return _cachedOtherW[uKey];
  const raw  = await gasAPI({ action:'getUserWeights', username });
  const rows = Array.isArray(raw) ? raw : [];
  const hasHdr = rows.length>0 && isNaN(parseFloat(rows[0][2]));
  const parsed = (hasHdr?rows.slice(1):rows)
    .map(r=>({ date:r[1], weight:parseFloat(r[2]) }))
    .filter(r=>r.weight>0)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
  _cachedOtherW[uKey] = parsed;
  if(saveToMyCache) _cachedWeights = parsed;
  return parsed;
}

async function logWeight(w){
  const d = await gasAPI({ action:'addWeight', username:S.user, weight:w, geo:'' });
  if(d.success){
    _cachedWeights = null;
    delete _cachedOtherW[S.user.toLowerCase()];
    _cachedLB = null;
  }
  return d.success;
}

function refreshData(){
  _cachedLB=null;
  _cachedWeights=null;

  addBotText("Data refreshed ✓ — ask me anything!");
}

// ── Extract a mentioned username from leaderboard ─────────────
function extractMentionedUser(text, lb){
  const t = text.toLowerCase();
  if(!lb) return null;
  for(const entry of lb){
    const name = entry.name.toLowerCase();
    const parts = name.split(/\s+/);
    if(t.includes(name)) return entry.name;
    for(const p of parts){
      if(p.length >= 3 && t.includes(p)) return entry.name;
    }
  }
  return null;
}

// ── Vision: read scale from image ────────────────────────────
async function readScaleFromImage(dataUrl){
  try{
    const resp = await puter.ai.chat([{
      role:'user',
      content:[
        { type:'image_url', image_url:{ url:dataUrl } },
        { type:'text', text:`You are reading a digital weighing scale display in this photo.

Your ONLY job: read the exact digits shown on the display — do NOT estimate, round, or guess.

Rules:
- Read every digit carefully. A "9" is NOT an "8". A "7" is NOT a "1".
- If the display shows "98.2", reply with exactly: 98.2
- If the display shows "103", reply with exactly: 103
- Do not convert units. Do not round. Do not approximate.
- If the screen is genuinely unreadable (blurry, off, not a scale), reply with exactly: unclear
- Reply with ONLY the number or the word "unclear". Nothing else. No units, no explanation.` }
      ]
    }], { model:'gpt-4o' });

    const raw = typeof resp==='string' ? resp : (resp?.message?.content || '');
    const cleaned = raw.trim().replace(/[^0-9.]/g,'');
    const num = parseFloat(cleaned);
    return isNaN(num) || num < 20 || num > 300 ? null : num;
  }catch(e){ return null; }
}

// ── Intent parsing ───────────────────────────────────────────
function parseIntent(text){
  const t = text.toLowerCase().trim();
  if(/\b(leaderboard|standings|ranking|who'?s (winning|leading)|top|1st|first place)\b/.test(t)) return 'leaderboard';
  // Other user progress/week queries — check BEFORE my own
  if(/\b(progress|stats|trend|how.*doing|week.?(on.?week|by.?week)|week.?table|week.?stats|breakdown|history)\b/.test(t)){
    // if "my" or self-reference → own stats
    if(/\b(my|mine|i am|i'm)\b/.test(t)) return /\b(week.?(on.?week|by.?week)|week.?stats|breakdown)\b/.test(t) ? 'week' : 'progress';
    return 'other_user'; // could be another user — will resolve in handleIntent
  }
  if(/\b(my progress|how (am i|am i doing)|my stats|my journey|my results)\b/.test(t)) return 'progress';
  if(/\b(this week|my week|weekly|week on week|week by week|week.?table|breakdown|wk)\b/.test(t)) return 'week';
  if(/\b(contest|challenge|prize|pool|rules|entry)\b/.test(t)) return 'contest';
  if(/\b(log|record|submit|weigh.?in|weight is|i weigh)\b/.test(t) || /\b\d{2,3}(\.\d)?\s*(kg)?\b/.test(t)) return 'log';
  if(/\b(buddy|advice|tip|help|recommend|motivate|how to|ask)\b/.test(t)) return 'buddy';
  return 'ai';
}

function extractWeight(text){
  const m = text.match(/\b(\d{2,3}(?:\.\d{1,2})?)\s*(?:kg|kgs|kilos?)?\b/i);
  return m ? parseFloat(m[1]) : null;
}

// ── Chip and quick actions ─────────────────────────────────────
async function chipAction(type){
  const labels = {
    leaderboard:'🏆 Leaderboard', progress:'📊 My Progress',
    week:'📅 My Week Stats', log:'⚖️ Log Weight',
    contest:'🎯 Contest Info', buddy:'💬 Ask Buddy'
  };
  addUserText(labels[type] || type);
  await handleIntent(type, '');
}

async function handleIntent(intent, rawText){
  showTyping();
  await new Promise(r=>setTimeout(r,300));

  // ── Resolve "other_user" intent ──────────────────────────────
  if(intent === 'other_user'){
    try{
      const lb = await getLeaderboard();
      const mentioned = extractMentionedUser(rawText, lb);
      if(!mentioned){
        // falls back to own progress
        intent = /\b(week.?(on.?week|by.?week)|week.?stats|breakdown)\b/.test(rawText.toLowerCase()) ? 'week' : 'progress';
      } else if(mentioned.toLowerCase() === S.user.toLowerCase()){
        intent = /\b(week.?(on.?week|by.?week)|week.?stats|breakdown)\b/.test(rawText.toLowerCase()) ? 'week' : 'progress';
      } else {
        // Show other user's data
        const isWeek = /\b(week.?(on.?week|by.?week)|week.?stats|breakdown|trend)\b/.test(rawText.toLowerCase());
        const weights = await getWeightsForUser(mentioned, false);
        hideTyping();
        if(!weights.length){
          addBotText(`Hmm, ${mentioned} hasn't logged any weigh-ins yet!`);
          return;
        }
        if(isWeek){
          const img = renderWeekCard(weights, mentioned);
          addBotText(`Here's **${mentioned}'s** week-by-week breakdown 📅`);
          setTimeout(()=>addCardMsg(img, `${mentioned}'s weight trend`, mentioned), 200);
        } else {
          const img = renderProgressCard(weights, mentioned);
          const pct = weights.length>=2 ? ((weights[0].weight-weights[weights.length-1].weight)/weights[0].weight*100).toFixed(1) : 0;
          addBotText(`**${mentioned}** has lost **${pct}%** so far — here's their progress 📈`);
          setTimeout(()=>addCardMsg(img, `${mentioned}'s progress card`, mentioned), 200);
        }
        return;
      }
    }catch(e){ hideTyping(); addBotText("Couldn't look up that user. Try again?"); return; }
  }

  if(intent === 'leaderboard'){
    try{
      const lb = await getLeaderboard();
      if(!lb.length){ hideTyping(); addBotText('No leaderboard data yet — everyone needs to log their first weigh-in!'); return; }
      const img = renderLeaderboardCard(lb, 'FitBounty Challenge 2026');
      hideTyping();
      addBotText(`Here's the current standings — **${lb.length} athletes** competing 🏆`);
      setTimeout(()=>addCardMsg(img, 'Current leaderboard', null), 200);
    }catch(e){ hideTyping(); addBotText('Could not load leaderboard. Check your connection.'); }

  } else if(intent === 'progress'){
    try{
      const weights = await getMyWeights();
      if(!weights.length){ hideTyping(); addBotText("You haven't logged any weigh-ins yet. Tap ⚖️ Log Weight to get started!"); return; }
      const img = renderProgressCard(weights, S.user);
      const pct  = weights.length>=2 ? ((weights[0].weight-weights[weights.length-1].weight)/weights[0].weight*100).toFixed(1) : 0;
      hideTyping();
      addBotText(`You've lost **${pct}%** so far — here's your full journey 📈`);
      setTimeout(()=>addCardMsg(img, 'Your weight trend', S.user), 200);
    }catch(e){ hideTyping(); addBotText('Could not load your data. Try again.'); }

  } else if(intent === 'week'){
    try{
      const weights = await getMyWeights();
      if(weights.length < 2){ hideTyping(); addBotText("You need at least 2 weigh-ins to see week-on-week changes. Log more!"); return; }
      const img = renderWeekCard(weights, S.user);
      hideTyping();
      addBotText(`Here's your week-by-week breakdown, **${S.user}** 📅`);
      setTimeout(()=>addCardMsg(img, 'Green = weight loss · Red = gain', S.user), 200);
    }catch(e){ hideTyping(); addBotText('Could not load your history.'); }

  } else if(intent === 'log'){
    const w = extractWeight(rawText);
    if(w){
      hideTyping();
      _pendingWeight = w;
      const isMonday = new Date().getDay()===1;
      addBotText(
        `Got it — **${w} kg** ⚖️\n\n${isMonday ? 'Today is Monday — this will be your **official weigh-in**!' : 'This will be logged as a practice entry (only Monday entries count for the leaderboard).'}\n\nShall I log this?`,
        [{ label:'✓ Yes, log it', fn:'confirmLog()', cls:'confirm' },
         { label:'✗ Cancel', fn:'cancelLog()', cls:'cancel' }]
      );
    } else {
      hideTyping();
      addBotText("Sure! What's your weight? Type a number (e.g. 82.5) or upload a photo of your scale 📷");
    }

  } else if(intent === 'contest'){
    try{
      const lb = await getLeaderboard();
      const me = lb.find(e=>e.name.toLowerCase()===S.user.toLowerCase());
      const rank = lb.findIndex(e=>e.name.toLowerCase()===S.user.toLowerCase())+1;
      hideTyping();
      addBotText(`📋 **FitBounty Challenge 2026**\n\n• ${lb.length} participants\n• Weekly Monday weigh-ins\n• Highest % weight loss wins\n• ₹500 penalty for missed weigh-in\n\n${me ? `Your rank: **#${rank}** · Loss: **${me.totalLossPct}%**` : "You're not in the contest yet!"}`);
    }catch(e){ hideTyping(); addBotText('Could not load contest info.'); }

  } else if(intent === 'buddy' || intent === 'ai'){
    const prompt = rawText || 'Give me a quick update on my fitness journey.';
    try{
      const [lb, weights] = await Promise.all([getLeaderboard().catch(()=>[]), getMyWeights().catch(()=>[])]);
      const reply = await aiBuddy(prompt, lb, weights);
      hideTyping();
      addBotText(reply);
    }catch(e){ hideTyping(); addBotText("I'm here to help — keep pushing and log those weigh-ins every Monday! 💪"); }
  }
}

// ── Weight confirmation ───────────────────────────────────────
async function confirmLog(){
  if(!_pendingWeight) return;
  const w = _pendingWeight; _pendingWeight=null;
  document.querySelectorAll('.mac').forEach(b=>b.disabled=true);
  showTyping();
  const ok = await logWeight(w);
  hideTyping();
  if(ok){
    addBotText(`✅ **${w} kg** logged successfully!\n\nKeep it up — see you next Monday for your official weigh-in 💪`);
  } else {
    addBotText('Something went wrong logging your weight. Try again.');
  }
}

function cancelLog(){
  _pendingWeight = null;
  document.querySelectorAll('.mac').forEach(b=>b.disabled=true);
  addBotText('Cancelled. No weight was logged.');
}

// ── Image upload handler ──────────────────────────────────────
async function handleImageUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = async ev => {
    const dataUrl = ev.target.result;
    addUserImage(dataUrl, 'Scale photo');
    showTyping();
    await new Promise(r=>setTimeout(r,500));

    const weight = await readScaleFromImage(dataUrl);
    hideTyping();

    if(weight){
      _pendingWeight = weight;
      const isMonday = new Date().getDay()===1;
      addBotText(
        `I can see **${weight} kg** on your scale ⚖️\n\n${isMonday ? 'Official weigh-in day — this counts for the leaderboard!' : 'Practice log — only Monday entries count officially.'}\n\nShall I log ${weight} kg?`,
        [{ label:'✓ Log '+weight+' kg', fn:'confirmLog()', cls:'confirm' },
         { label:'✗ Cancel', fn:'cancelLog()', cls:'cancel' }]
      );
    } else {
      addBotText("I couldn't read the weight from this photo clearly 🤔\n\nTry a well-lit close-up of the display, or type your weight manually.");
    }
  };
  reader.readAsDataURL(file);
}

// ── Text input handler ────────────────────────────────────────
async function sendText(){
  const input = document.getElementById('txt-input');
  const text  = input.value.trim();
  if(!text) return;
  input.value = ''; autoGrow(input);
  addUserText(text);

  // Smart routing: check if user is asking about another user's progress/week
  let intent = parseIntent(text);

  // If it's a generic 'other_user' flow or an 'ai' fallback but mentions a name, try to detect
  if(intent === 'ai'){
    // Check if leaderboard names appear in the message for user-specific queries
    try{
      const lb = _cachedLB || await getLeaderboard().catch(()=>[]);
      const mentioned = extractMentionedUser(text, lb);
      if(mentioned && mentioned.toLowerCase() !== S.user.toLowerCase()){
        intent = 'other_user';
      }
    }catch(e){}
  }

  await handleIntent(intent, text);
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── AUTH ─────────────────────────────────────────────────────
function authTab(t){
  document.getElementById('t-sign').classList.toggle('on', t==='sign');
  document.getElementById('t-join').classList.toggle('on', t==='join');
  document.getElementById('form-sign').style.display = t==='sign'?'':'none';
  document.getElementById('form-join').style.display = t==='join'?'':'none';
  document.getElementById('auth-err').style.display = 'none';
}

function showErr(msg){ const e=document.getElementById('auth-err'); e.textContent=msg; e.style.display=''; }

async function doLogin(){
  const u=document.getElementById('li-u').value.trim();
  const p=document.getElementById('li-p').value;
  if(!u||!p){ showErr('Enter username and password'); return; }
  const btn=document.getElementById('li-btn');
  btn.innerHTML='<div class="spin"></div>'; btn.disabled=true;
  try{
    const d = await gasAPI({ action:'authenticate', username:u, password:p });
    if(d.success){ S.set(u.toLowerCase()); await startChat(); promptNotifications(); if(Notification.permission==='granted'){ registerServiceWorker().then(()=>startNudgeScheduler()); } }
    else showErr(d.message||'Invalid credentials');
  }catch(e){ showErr('Connection error. Try again.'); }
  btn.innerHTML='Sign In'; btn.disabled=false;
}

async function doRegister(){
  const n=document.getElementById('rg-n').value.trim();
  const u=document.getElementById('rg-u').value.trim().toLowerCase();
  const ph=document.getElementById('rg-ph').value.trim();
  const p=document.getElementById('rg-p').value;
  if(!n||!u||!ph||!p){ showErr('Fill in all fields'); return; }
  const btn=document.getElementById('rg-btn');
  btn.innerHTML='<div class="spin"></div>'; btn.disabled=true;
  try{
    const d = await gasAPI({ action:'registerUser', username:u, email:ph, password:p });
    if(d.success){ S.set(u); await startChat(); promptNotifications(); if(Notification.permission==='granted'){ registerServiceWorker().then(()=>startNudgeScheduler()); } }
    else showErr(d.message||'Registration failed');
  }catch(e){ showErr('Connection error. Try again.'); }
  btn.innerHTML='Create Account'; btn.disabled=false;
}

document.getElementById('li-p').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('li-u').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('li-p').focus(); });

function doLogout(){
  if(!confirm('Logout?')) return;
  S.clear();
  if(_nudgeCheckInterval){ clearInterval(_nudgeCheckInterval); _nudgeCheckInterval=null; }
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById('messages').innerHTML='';
  _cachedLB=null; _cachedWeights=null; _cachedOtherW={}; _chatHistory=[];
  document.getElementById('s-login').classList.add('on');
}

// ── App start ─────────────────────────────────────────────────
async function startChat(){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-chat').classList.add('on');
  document.getElementById('messages').innerHTML = '';

  // Try to restore previous conversation
  const restored = restoreMessages();
  if(restored){
    // Just show a subtle "back online" note
    setTimeout(()=>{
      const note = document.createElement('div');
      note.style.cssText = 'text-align:center;font-size:11px;color:var(--text3);padding:4px 0 8px;';
      note.textContent = '↑ Previous conversation restored';
      document.getElementById('messages').insertBefore(note, document.getElementById('messages').firstChild);
      scrollDown();
    }, 100);
    return;
  }

  // Fresh start — show greeting
  const day = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
  const isMonday = new Date().getDay()===1;
  showTyping();
  await new Promise(r=>setTimeout(r,700));
  hideTyping();

  addBotText(`Hey ${S.user}! 👋 I'm **Buddy**, your FitBounty assistant.\n\n${isMonday ? '🗓️ It\'s weigh-in day! Log your weight and let\'s see where you stand.' : `Happy ${day}! Ask me about the leaderboard, your progress, or anyone else's stats.`}`);

  setTimeout(()=>{
    getLeaderboard().then(lb=>{
      const me   = lb.find(e=>e.name.toLowerCase()===S.user.toLowerCase());
      const rank = lb.findIndex(e=>e.name.toLowerCase()===S.user.toLowerCase())+1;
      if(me && rank){
        setTimeout(()=>{
          addBotText(`You're currently **#${rank}** out of ${lb.length} athletes with a **${me.totalLossPct}% loss** 🔥\n\nWhat would you like to know?`);
        }, 600);
      }
    }).catch(()=>{});
  }, 400);
}

// ── Permission request ─────────────────────────────────────────
async function requestNotificationPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

// ── Fire a notification ────────────────────────────────────────
function fireNotification(title, body, tag){
  if(Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%2309090f"/><text x="32" y="44" font-size="32" text-anchor="middle">⚡</text></svg>',
    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23d4a853"/><text x="32" y="44" font-size="32" text-anchor="middle">⚡</text></svg>',
    tag: tag || 'fitbounty-nudge',
    renotify: true,
    requireInteraction: true
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// ── Register Service Worker for background notifications ───────
async function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
self.addEventListener('message', e => {
  if(e.data && e.data.type === 'SCHEDULE_NUDGE'){
    const { delayMs, title, body, tag } = e.data;
    setTimeout(() => {
      self.registration.showNotification(title, {
        body,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%2309090f"/><text x="32" y="44" font-size="32" text-anchor="middle">⚡</text></svg>',
        tag: tag || 'fitbounty-nudge',
        renotify: true,
        requireInteraction: true,
        data: { url: self.location.origin }
      });
    }, delayMs);
  }
});
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.openWindow(e.notification.data && e.notification.data.url ? e.notification.data.url : '/'));
});
`;
  try{
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    const reg = await navigator.serviceWorker.register(swUrl, { scope: '/' });
    return reg;
  }catch(e){ return null; }
}

// ── Determine if user is on track ─────────────────────────────
function isOnTrack(weights){
  if(!weights || weights.length < 2) return null; // unknown
  const recent = weights.slice(-3); // last 3 entries
  const first  = recent[0].weight;
  const last   = recent[recent.length-1].weight;
  return last <= first; // losing or maintaining = on track
}

function getTrendKg(weights){
  if(!weights || weights.length < 2) return 0;
  return parseFloat((weights[weights.length-1].weight - weights[0].weight).toFixed(2));
}

// ── Schedule nudges via SW ────────────────────────────────────
async function scheduleSwNudge(delayMs, title, body, tag){
  try{
    const reg = await navigator.serviceWorker.ready;
    if(reg && reg.active){
      reg.active.postMessage({ type:'SCHEDULE_NUDGE', delayMs, title, body, tag });
      return true;
    }
  }catch(e){}
  return false;
}

// ── Build in-chat nudge message ───────────────────────────────
async function buildNudgeMessage(weights, day){
  const onTrack = isOnTrack(weights);
  const trendKg = getTrendKg(weights);
  const last    = weights.length ? weights[weights.length-1] : null;
  const lastWt  = last ? last.weight : null;

  let msg = '';
  const tips = onTrack === false
    ? DIET_TIPS.offTrack
    : DIET_TIPS.onTrack;

  // Pick 3 random tips
  const picked = [...tips].sort(()=>Math.random()-.5).slice(0,3);

  if(day === 6){ // Sunday
    if(onTrack === false){
      msg = `🚨 **Tomorrow is weigh-in day** and your recent trend shows a gain of **+${Math.abs(trendKg)} kg**.\n\nHere's a rescue plan to avoid the ₹500 penalty:\n\n${picked.map(t=>'• '+t).join('\n')}\n\nLog your weight tomorrow morning first thing — you've got this! 💪`;
    } else if(onTrack === true){
      msg = `🎯 **Tomorrow is weigh-in day!** Your trend is looking good${lastWt ? ` (currently around ${lastWt} kg)` : ''}.\n\nA few tips to stay sharp:\n\n${picked.map(t=>'• '+t).join('\n')}`;
    } else {
      msg = `⚖️ **Tomorrow is Monday weigh-in day!** Make sure you're ready to log first thing in the morning.\n\n${picked.map(t=>'• '+t).join('\n')}`;
    }
  } else if(day === 5){ // Saturday
    if(onTrack === false){
      msg = `⚠️ **Weekend check-in!** Your recent trend suggests you may be slightly off pace. Two days to course-correct.\n\n${picked.map(t=>'• '+t).join('\n')}\n\nSmall changes today and tomorrow can make a big difference on the scale Monday!`;
    } else {
      msg = `✅ **Weekend check-in!** You're on track${lastWt ? ` — last logged: ${lastWt} kg` : ''}. Keep your weekend meals clean.\n\n${picked.map(t=>'• '+t).join('\n')}`;
    }
  } else if(day === 5){ // Friday
    msg = `💡 **Weekend ahead!** Weekends are where most people lose their streak.\n\n${picked.map(t=>'• '+t).join('\n')}`;
  }

  return msg;
}

// ── In-app nudge scheduler (runs while app is open) ───────────
let _nudgeCheckInterval = null;

function startNudgeScheduler(){
  if(_nudgeCheckInterval) return;
  checkAndNudge(); // run immediately on open
  _nudgeCheckInterval = setInterval(checkAndNudge, 60 * 60 * 1000); // re-check hourly
}

async function checkAndNudge(){
  if(!S.user) return;
  const now  = new Date();
  const day  = now.getDay();   // 0=Sun, 1=Mon, ... 5=Fri, 6=Sat
  const hour = now.getHours();

  // Only nudge during relevant days & times
  const shouldNudge =
    (day === 5 && hour >= 18)  || // Friday evening
    (day === 6 && hour >= 9)   || // Saturday morning+
    (day === 0 && hour >= 8)   || // Sunday morning+
    (day === 1 && hour >= 6 && hour <= 11); // Monday morning

  if(!shouldNudge) return;

  // Check if we already nudged today
  const nudgeKey = `fb_nudged_${now.toDateString()}`;
  if(localStorage.getItem(nudgeKey)) return;

  try{
    const weights = await getMyWeights();
    const onTrack = isOnTrack(weights);
    const name    = S.user;

    let title = '', body = '';

    if(day === 1){ // Monday
      if(hour <= 9){
        title = NUDGES.monday_morning.title.replace('{name}', name);
        body  = NUDGES.monday_morning.body;
      } else {
        title = NUDGES.monday_reminder.title.replace('{name}', name);
        body  = NUDGES.monday_reminder.body;
      }
    } else {
      const dayKey = day === 5 ? 'friday' : day === 6 ? 'saturday' : 'sunday';
      const variant = (onTrack === false) ? 'offTrack' : 'onTrack';
      const nudge   = NUDGES[dayKey][variant];
      title = nudge.title.replace('{name}', name);
      body  = nudge.body;
    }

    // Fire OS notification
    fireNotification(title, body, 'fb-nudge-'+day);

    // Also inject nudge into the chat conversation
    if(document.getElementById('s-chat').classList.contains('on')){
      const chatMsg = await buildNudgeMessage(weights, day);
      if(chatMsg){
        setTimeout(()=>{
          addBotText(`📣 **Buddy Nudge**\n\n${chatMsg}`, [
            { label:'📊 See My Progress', fn:"chipAction('progress')", cls:'' },
            { label:'⚖️ Log Weight', fn:"chipAction('log')", cls:'confirm' }
          ]);
        }, 1000);
      }
    }

    localStorage.setItem(nudgeKey, '1');
  }catch(e){}
}

// ── Ask user to enable notifications (polite prompt) ──────────
async function promptNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted'){
    await registerServiceWorker();
    startNudgeScheduler();
    return;
  }
  if(Notification.permission === 'denied') return;

  // Show in-chat permission ask instead of browser popup immediately
  const permKey = 'fb_notif_asked';
  if(localStorage.getItem(permKey)) return;
  localStorage.setItem(permKey, '1');

  setTimeout(()=>{
    addBotText(
      `🔔 **Want weigh-in reminders?**\n\nBuddy can nudge you before Monday to check if you're on track — and suggest diet tips if you need a little help avoiding the penalty.\n\nTap below to enable!`,
      [{ label:'🔔 Yes, remind me!', fn:'enableNotifications()', cls:'confirm' },
       { label:'Maybe later', fn:'', cls:'cancel' }]
    );
  }, 2000);
}

async function enableNotifications(){
  document.querySelectorAll('.mac').forEach(b=>b.disabled=true);
  const granted = await requestNotificationPermission();
  if(granted){
    await registerServiceWorker();
    startNudgeScheduler();
    addBotText(`✅ **Notifications enabled!**\n\nI'll nudge you on Fridays, Saturdays, and Sundays before weigh-in day — and give you diet tips if you need to course-correct. 💪`);
  } else {
    addBotText(`No worries! You can always check in manually. I'll still give you tips when you open the app before Monday. 👍`);
  }
}

// ── Boot ──────────────────────────────────────────────────────
(function init(){
  if(S.user){
    startChat().then(()=>{
      promptNotifications();
      if(Notification.permission === 'granted'){
        registerServiceWorker().then(()=> startNudgeScheduler());
      }
    });
  }
})();
